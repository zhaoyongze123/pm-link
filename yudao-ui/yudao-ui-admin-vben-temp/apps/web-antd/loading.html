<style data-app-loading="inject-css">
  html {
    line-height: 1.15;
  }

  #__app-loading__.hidden {
    visibility: hidden;
    opacity: 0;
    transform: translateY(8px) scale(0.985);
    transition:
      opacity 0.38s ease-out,
      visibility 0.38s ease-out,
      transform 0.38s ease-out;
  }

  .oa-lite-loading {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    pointer-events: none;
    background:
      radial-gradient(circle at 16% 18%, rgb(37 99 235 / 10%), transparent 24%),
      radial-gradient(circle at 82% 12%, rgb(14 165 233 / 10%), transparent 22%),
      linear-gradient(180deg, #f6f9fd 0%, #edf3f9 100%);
  }

  .oa-lite-loading::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, rgb(255 255 255 / 84%), transparent 54%),
      linear-gradient(0deg, rgb(255 255 255 / 40%), rgb(255 255 255 / 0%));
  }

  .oa-lite-loading-card {
    position: relative;
    display: grid;
    width: min(420px, calc(100vw - 40px));
    gap: 16px;
    padding: 26px 24px 22px;
    border: 1px solid rgb(219 228 238 / 96%);
    border-radius: 24px;
    background: rgb(255 255 255 / 82%);
    box-shadow:
      0 22px 48px rgb(15 23 42 / 8%),
      inset 0 1px 0 rgb(255 255 255 / 68%);
    backdrop-filter: blur(12px);
  }

  .oa-lite-loading-brand {
    display: flex;
    height: 42px;
    width: 42px;
    align-items: center;
    justify-content: center;
    border-radius: 14px;
    background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
    box-shadow: inset 0 1px 0 rgb(255 255 255 / 80%);
  }

  .oa-lite-loading-brand::before {
    content: '';
    width: 16px;
    height: 16px;
    border: 2px solid rgb(37 99 235 / 18%);
    border-top-color: #2563eb;
    border-radius: 999px;
    animation: oa-lite-loading-spin 0.9s linear infinite;
  }

  .oa-lite-loading-copy {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .oa-lite-loading-title {
    color: #17202d;
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .oa-lite-loading-subtitle {
    color: #4c5b70;
    font-size: 13px;
    line-height: 1.65;
  }

  .oa-lite-loading-progress {
    position: relative;
    height: 4px;
    overflow: hidden;
    border-radius: 999px;
    background: rgb(203 213 225 / 72%);
  }

  .oa-lite-loading-progress::before {
    content: '';
    position: absolute;
    inset: 0;
    width: 34%;
    border-radius: inherit;
    background: linear-gradient(90deg, #2563eb 0%, #0ea5e9 100%);
    animation: oa-lite-loading-slide 1.15s ease-in-out infinite;
  }

  .oa-lite-loading-dots {
    display: flex;
    gap: 8px;
  }

  .oa-lite-loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 999px;
    background: rgb(59 130 246 / 32%);
    animation: oa-lite-loading-bounce 1.1s ease-in-out infinite;
  }

  .oa-lite-loading-dots span:nth-child(2) {
    animation-delay: 0.16s;
  }

  .oa-lite-loading-dots span:nth-child(3) {
    animation-delay: 0.32s;
  }

  @keyframes oa-lite-loading-slide {
    0% {
      transform: translateX(-120%);
    }

    60%,
    100% {
      transform: translateX(220%);
    }
  }

  @keyframes oa-lite-loading-bounce {
    0%,
    100% {
      opacity: 0.38;
      transform: translateY(0);
    }

    50% {
      opacity: 1;
      transform: translateY(-3px);
    }
  }

  @keyframes oa-lite-loading-spin {
    0% {
      transform: rotate(0deg);
    }

    100% {
      transform: rotate(360deg);
    }
  }

  @media (max-width: 640px) {
    .oa-lite-loading-card {
      padding: 22px 18px 18px;
      border-radius: 20px;
    }

    .oa-lite-loading-title {
      font-size: 16px;
    }

    .oa-lite-loading-subtitle {
      font-size: 12px;
    }
  }
</style>
<div class="oa-lite-loading" id="__app-loading__">
  <div class="oa-lite-loading-card">
    <div class="oa-lite-loading-brand"></div>
    <div class="oa-lite-loading-copy">
      <div class="oa-lite-loading-title">正在进入工作台</div>
      <div class="oa-lite-loading-subtitle">正在连接工作台并恢复当前页面，请稍候</div>
    </div>
    <div class="oa-lite-loading-progress"></div>
    <div class="oa-lite-loading-dots" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</div>
